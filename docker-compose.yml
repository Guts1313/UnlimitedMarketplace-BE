services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-60}
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.3.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-unlimitedmarketplace}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3390:3306"  # Host port 3390 to avoid local conflicts
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

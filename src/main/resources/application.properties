spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/unlimitedmarketplace?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.security.user.name=${SPRING_SECURITY_USER_NAME:user}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:}
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:60}
server.port=${SERVER_PORT:8080}
server.address=0.0.0.0
